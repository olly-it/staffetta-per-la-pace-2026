<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- candela accesa al centro, simbolo di silenzio e preghiera -->
  <!-- fiamma -->
  <path d="M100 22 q -6 8 0 18 q 6 -10 0 -18 z" fill="#ffffff" fill-opacity=".55" stroke="#ffffff" stroke-width="1" />
  <path d="M100 28 q -3 5 0 10 q 3 -6 0 -10 z" fill="#ffffff" stroke="none" />
  <!-- stoppino -->
  <line x1="100" y1="40" x2="100" y2="46" />
  <!-- corpo candela -->
  <rect x="92" y="46" width="16" height="36" rx="2" fill="#ffffff" fill-opacity=".12" />
  <!-- base / piattino -->
  <ellipse cx="100" cy="84" rx="22" ry="3" fill="#ffffff" fill-opacity=".2" />
  <!-- alone luminoso -->
  <circle cx="100" cy="30" r="22" opacity=".25" stroke-dasharray="2 4" />
  <!-- piccole stelle / silenzio -->
  <g opacity=".55" fill="#ffffff" stroke="none">
    <circle cx="40" cy="40" r="1.2" />
    <circle cx="55" cy="60" r="1" />
    <circle cx="160" cy="38" r="1.2" />
    <circle cx="145" cy="58" r="1" />
    <circle cx="25" cy="65" r="1" />
    <circle cx="175" cy="65" r="1" />
  </g>
</svg>
